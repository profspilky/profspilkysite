services:
  - type: web
    name: fpu-web
    runtime: python
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "gunicorn project.wsgi:application --workers 3 --threads 2 --timeout 60"
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: project.settings.production
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fpu-db
          property: connectionString

      # ── Cloudinary ──────────────────────────────────────────────────────────
      # Усі три окремих змінних потрібні для django-cloudinary-storage.
      # CLOUDINARY_URL потрібна для прямого виклику cloudinary SDK
      # (import_images, import_body_images management commands).
      # Формат: cloudinary://<api_key>:<api_secret>@<cloud_name>
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Email ────────────────────────────────────────────────────────────────
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # ── Monitoring ──────────────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

      # ── Security ─────────────────────────────────────────────────────────────
      - key: SECURE_SSL_REDIRECT
        value: "True"

      # ── Cache (Redis) ─────────────────────────────────────────────────────
      # Потрібний для міжпроцесного rate-limiting контактної форми
      # (3 gunicorn workers → LocMemCache не підходить).
      # Підключіть Redis-сервіс Render і вставте fromService або sync: false.
      - key: REDIS_URL
        sync: false

databases:
  - name: fpu-db
    plan: free
    databaseName: fpu
    user: fpu
